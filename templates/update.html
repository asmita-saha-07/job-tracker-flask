<!doctype html>
<html lang="en">

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Job Application Tracker</title>
</head>

<body>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container">
            <a class="navbar-brand" href="/update/{{job.slno}}">Update</a>
        </div>
    </nav>

    <div class="container mt-4">

        <h2 class="text-center mb-4">Job Application Tracker</h2>

        <div class="row justify-content-center">
            <div class="col-md-6">

                <div class="card shadow-sm p-3">

                    <h4 class="mb-3">Update job</h4>

                    <form method="POST" action="/update/{{ job.slno }}">

                        <div class="mb-3">
                            <label class="form-label">Enter company name</label>
                            <input type="text" class="form-control" name="company" value="{{ job.company }}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Enter role</label>
                            <input type="text" class="form-control" name="role" value="{{ job.role }}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Enter notes</label>
                            <input type="text" class="form-control" name="notes" value="{{ job.notes }}">
                        </div>

                        <button type="submit" class="btn btn-primary">
                            Update
                        </button>

                        <a href="/" class="btn btn-secondary">
                            Cancel
                        </a>

                    </form>

                </div>
            </div>
        </div>

    </div>

</body>

</html>
